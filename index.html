<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Settings</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #6b6b8a;
      padding: 20px;
      margin: 0;
    }
    .container {
      max-width: 400px;
      margin: 0 auto;
      background-color: #f5f5f7;
      padding: 20px;
      border-radius: 8px;
    }
    label {
      font-weight: bold;
      display: block;
      margin-top: 15px;
      margin-bottom: 5px;
      color: #000;
      font-size: 16px;
    }
    input, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 15px;
      background-color: white;
    }
    textarea {
      resize: none;
      height: 60px;
    }
    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      background-color: #d3d3d3;
      border: 2px solid #999;
      color: #555;
      font-size: 16px;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: #c0c0c0;
    }
    h2 {
      text-align: center;
      margin: 25px 0 15px 0;
      font-weight: normal;
    }
    hr {
      border: none;
      border-top: 1px solid #ccc;
      margin: 20px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <label for="username">Username</label>
    <input type="text" id="username" value="musty30">

    <button>Save</button>

    <h2>Personal Information</h2>
    <hr>

    <label for="name">Name</label>
    <input type="text" id="name" value="Al-Mustapha Ibrahim">

    <label for="location">Location</label>
    <input type="text" id="location" value="Nigeria kano">

    <label for="picture">Picture</label>
    <input type="text" id="picture" value="https://github.com/ghost.png">

    <label for="about">About</label>
    <textarea id="about">Musty from kano</textarea>

    <button>Save</button>
  </div>
</body>
      </html>
